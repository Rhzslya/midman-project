version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: midman-postgres
    restart: always
    environment:
      POSTGRES_USER: seira
      POSTGRES_PASSWORD: RootPassword123
      POSTGRES_DB: midman-db
    ports:
      - "5432:5432"
    volumes:
      - midman_db_data:/var/lib/postgresql/data

volumes:
  midman_db_data:
